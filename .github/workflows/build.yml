name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant permission
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew assembleRelease

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "**/*.apk"
